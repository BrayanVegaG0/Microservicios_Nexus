spring.application.name=cbs
# Conexión al servidor Discovery
# Ejemplo para ms-transacciones
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5433/db_nexus_cbs
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8762/eureka}
spring.datasource.username=postgres
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=9093
